<!DOCTYPE html>
<html>
<head><title>Gerar Ícones</title></head>
<body style="font-family:sans-serif;padding:40px;background:#0d1117;color:#e6edf3;">
<h1>Gerar Ícones do App</h1>
<p>Clique no botão para gerar todos os ícones necessários.</p>
<button id="generate" style="padding:12px 24px;background:#1a6dff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;">
  Gerar Ícones
</button>
<div id="status" style="margin-top:20px;"></div>
<script>
document.getElementById('generate').addEventListener('click', async () => {
  const status = document.getElementById('status');
  status.innerHTML = 'Gerando ícones...';

  const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  for (const size of sizes) {
    canvas.width = size;
    canvas.height = size;

    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#1a6dff');
    gradient.addColorStop(1, '#0d47a1');
    ctx.fillStyle = gradient;

    const radius = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(radius, 0);
    ctx.lineTo(size - radius, 0);
    ctx.quadraticCurveTo(size, 0, size, radius);
    ctx.lineTo(size, size - radius);
    ctx.quadraticCurveTo(size, size, size - radius, size);
    ctx.lineTo(radius, size);
    ctx.quadraticCurveTo(0, size, 0, size - radius);
    ctx.lineTo(0, radius);
    ctx.quadraticCurveTo(0, 0, radius, 0);
    ctx.closePath();
    ctx.fill();

    // Motorcycle - scaled to size
    const s = size / 512;
    ctx.save();
    ctx.translate(size * 0.5, size * 0.55);
    ctx.scale(s, s);

    // Body
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.ellipse(0, 0, 180, 70, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wheels
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(-160, 0, 55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(160, 0, 55, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(-160, 0, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(160, 0, 15, 0, Math.PI * 2);
    ctx.fill();

    // Handlebar
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(-80, -40);
    ctx.quadraticCurveTo(-100, -80, -60, -90);
    ctx.stroke();

    // Seat
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.ellipse(-20, -25, 40, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Exhaust
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.roundRect(100, 10, 60, 12, 6);
    ctx.fill();

    ctx.restore();

    // Fuel drop
    ctx.save();
    ctx.translate(size * 0.74, size * 0.23);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(-20, 20, -20, 40);
    ctx.arc(0, 40, 20, Math.PI, 0);
    ctx.quadraticCurveTo(20, 20, 0, 0);
    ctx.fill();
    ctx.restore();

    // Download
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    status.innerHTML += `<br>✓ icon-${size}.png gerado (${size}x${size})`;
    await new Promise(r => setTimeout(r, 100));
  }

  // Generate favicon (32x32, 16x16)
  for (const size of [32, 16]) {
    canvas.width = size;
    canvas.height = size;
    const gradient = ctx.createLinearGradient(0, 0, size, size);
    gradient.addColorStop(0, '#1a6dff');
    gradient.addColorStop(1, '#0d47a1');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);

    const s = size / 512;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(size/2, size*0.55, size*0.15, 0, Math.PI*2);
    ctx.fill();

    const link = document.createElement('a');
    link.download = `favicon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    status.innerHTML += `<br>✓ favicon-${size}.png gerado`;
  }

  status.innerHTML += '<br><br><strong>Todos os ícones gerados com sucesso!</strong>';
  status.innerHTML += '<br><br>Copie os arquivos para a pasta icons/ do projeto.';
});
</script>
</body>
</html>
