<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6dff"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g transform="translate(256,280)">
    <!-- Motorcycle body -->
    <ellipse cx="0" cy="0" rx="180" ry="70" fill="#ffffff" opacity="0.95"/>
    <!-- Front wheel -->
    <circle cx="-160" cy="0" r="55" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>
    <circle cx="-160" cy="0" r="15" fill="#ffffff" opacity="0.9"/>
    <!-- Rear wheel -->
    <circle cx="160" cy="0" r="55" fill="none" stroke="#ffffff" stroke-width="8" opacity="0.9"/>
    <circle cx="160" cy="0" r="15" fill="#ffffff" opacity="0.9"/>
    <!-- Handlebar -->
    <path d="M-80,-40 Q-100,-80 -60,-90" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
    <!-- Seat -->
    <ellipse cx="-20" cy="-25" rx="40" ry="12" fill="#ffffff" opacity="0.9"/>
    <!-- Exhaust -->
    <rect x="100" y="10" width="60" height="12" rx="6" fill="#ffffff" opacity="0.8"/>
  </g>
  <!-- Fuel drop icon -->
  <g transform="translate(380,120)">
    <path d="M0,0 Q-20,20 -20,40 A20,20 0 0,0 20,40 Q20,20 0,0Z" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
